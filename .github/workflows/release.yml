name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build plugin
        run: |
          mkdir -p build/wp-url-manager
          cp -r admin build/wp-url-manager/
          cp -r includes build/wp-url-manager/
          cp -r languages build/wp-url-manager/
          cp wp-url-manager.php build/wp-url-manager/
          cp uninstall.php build/wp-url-manager/
          cp README.md build/wp-url-manager/
          cp CHANGELOG.md build/wp-url-manager/
          cd build
          zip -r wp-url-manager-${{ steps.get_version.outputs.VERSION }}.zip wp-url-manager
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Version ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/wp-url-manager-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: wp-url-manager-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip
