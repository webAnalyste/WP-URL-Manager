name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build plugin
        run: |
          mkdir -p build/wp-url-manager
          cp -r admin build/wp-url-manager/
          cp -r includes build/wp-url-manager/
          cp -r languages build/wp-url-manager/
          cp wp-url-manager.php build/wp-url-manager/
          cp uninstall.php build/wp-url-manager/
          cp README.md build/wp-url-manager/
          cp CHANGELOG.md build/wp-url-manager/
          cd build
          zip -r wp-url-manager-${{ steps.get_version.outputs.VERSION }}.zip wp-url-manager
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Version ${{ steps.get_version.outputs.VERSION }}
          files: ./build/wp-url-manager-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
